
volumes:
  mlops-shared:

networks:
  mlops-network:

services:

 
  ingestion:
    build: ./data-ingestion
    image: mlops-ingestion
    volumes:
      - mlops-shared:/app/shared
    networks:
      - mlops-network

  
  training:
    build: ./training
    image: mlops-training
    volumes:
      - mlops-shared:/app/shared
    networks:
      - mlops-network


  serving:
    build: ./serving
    image: mlops-serving
    volumes:
      - mlops-shared:/app/shared
    networks:
      - mlops-network
    ports:
      - "${SERVING_HOST_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3


  monitoring:
    build: ./monitoring
    image: mlops-monitoring
    volumes:
      - mlops-shared:/app/shared
    networks:
      - mlops-network
    ports:
      - "${MONITORING_HOST_PORT:-8001}:8001"
    depends_on:
      - serving
    environment:
      
      - SERVING_URL=http://serving:8000

  
  frontend:
    build: ./frontend
    image: mlops-frontend
    networks:
      - mlops-network
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:3000"
    depends_on:
      - serving
      - monitoring